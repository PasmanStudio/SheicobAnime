<!DOCTYPE html>

<head>

  body {
    margin: 0; min-height: 100vh;

    background: #07090E; color: #F2F6FB;
    font-family: system-ui, -apple-system, sans-serif;

  img { height: 40px; width: auto; }

  }

  <img src="/logo.png" alt="SheicobAnime" style="mix-blend-mode:screen">
