name: News — Anime RSS → Instagram

# 5 corridas curadas por día (antes: cada hora, 13/día → spam + agotaba la cuota
# de Gemini). Cada corrida elige la noticia MÁS relevante del pool acumulado y
# publica 1 sola. Menos posts, mejores, y ~9-12 llamadas Gemini/día (dentro del
# free tier). Horarios pensados para el pico de Argentina (UTC-3).
# Fast job: ~3–5 minutes total (RSS fetch + article scrape + IG API calls).
# No Hangfire — uses the standalone --news mode that exits after one post.

on:
  schedule:
    # Horarios Argentina (UTC-3) → UTC. GHA cron solo corre en UTC.
    - cron: '0 15 * * *'   # 12:00 ART
    - cron: '0 18 * * *'   # 15:00 ART
    - cron: '0 20 * * *'   # 17:00 ART
    - cron: '0 22 * * *'   # 19:00 ART
    - cron: '0 1 * * *'    # 22:00 ART (día anterior en UTC)
  workflow_dispatch:   # allow manual trigger from Actions tab

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  news:
    name: Post anime news
    runs-on: ubuntu-latest
    timeout-minutes: 10   # safety cap — normal run is ~3–5 min

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '9.x'

      # El Reel de noticias (motion card animada) necesita ffmpeg — ubuntu-latest
      # NO lo trae preinstalado (confirmado en vivo: "ffmpeg no encontrado" en el
      # run del 4-jul-2026). Sin este paso el reel cae a "skipped" silenciosamente
      # y el resto del pipeline (feed+story) sigue andando igual.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # yt-dlp para el reel "tráiler + titular" (busca y baja la versión en
      # español latino del tráiler). pipx viene preinstalado en el runner y trae
      # la versión actual (la de apt queda vieja y YouTube la rompe).
      # NOTA (jul-2026, matriz probada en vivo en el workflow yt-diag): el PO
      # token provider (bgutil) y las cookies se ELIMINARON — con android_vr +
      # WARP no hacen falta, y las cookies directamente ROMPEN a android_vr.
      - name: Install yt-dlp
        run: |
          pipx install yt-dlp
          yt-dlp --version

      # Cloudflare WARP como salida de yt-dlp: YouTube bloquea por IP a los
      # runners (confirmado jul-2026: las 21 combinaciones cliente×cookies
      # fallaron con "Sign in to confirm you're not a bot"); las IPs de WARP se
      # clasifican como VPN de consumo y pasan. El perfil WireGuard se registró
      # UNA vez fuera de CI (wgcf register desde el runner da 429) y vive en el
      # secret WARP_WIREGUARD_CONFIG; wireproxy lo expone como SOCKS5 local SOLO
      # para yt-dlp. Best-effort: si el túnel no levanta, YTDLP_PROXY queda vacío
      # y el reel cae al slideshow como siempre.
      - name: Start Cloudflare WARP proxy (wireproxy)
        env:
          WARP_WIREGUARD_CONFIG: ${{ secrets.WARP_WIREGUARD_CONFIG }}
        run: |
          if [ -z "$WARP_WIREGUARD_CONFIG" ]; then
            echo "sin secret WARP_WIREGUARD_CONFIG — yt-dlp corre directo (slideshow probable)"
            exit 0
          fi
          cd "$RUNNER_TEMP"
          # Versión pineada con URL directa (la API de releases devolvía null desde CI)
          curl -sL -o wireproxy.tar.gz \
            "https://github.com/whyvl/wireproxy/releases/download/v1.1.2/wireproxy_linux_amd64.tar.gz"
          tar -xzf wireproxy.tar.gz
          printf '%s\n\n[Socks5]\nBindAddress = 127.0.0.1:1080\n' "$WARP_WIREGUARD_CONFIG" > wp.conf
          nohup ./wireproxy -c wp.conf > wireproxy.log 2>&1 &
          sleep 3
          WARP_IP=$(curl -s -m 15 --proxy socks5h://127.0.0.1:1080 ifconfig.me || true)
          if [ -n "$WARP_IP" ]; then
            echo "WARP arriba (IP de salida: $WARP_IP)"
            echo "YTDLP_PROXY=socks5h://127.0.0.1:1080" >> "$GITHUB_ENV"
          else
            echo "WARP no respondió — yt-dlp corre directo (slideshow probable)"
            tail -5 wireproxy.log || true
          fi

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-scraper-${{ hashFiles('scraper/**/*.csproj', 'api/AnimeIndex.Api/AnimeIndex.Api.csproj') }}
          restore-keys: nuget-scraper-

      - name: Restore
        run: dotnet restore scraper/AnimeIndex.Scraper/AnimeIndex.Scraper.csproj

      - name: Build
        run: dotnet build scraper/AnimeIndex.Scraper/AnimeIndex.Scraper.csproj --no-restore -c Release

      - name: Run news pipeline
        run: dotnet run --project scraper/AnimeIndex.Scraper --no-build -c Release -- --news
        env:
          ASPNETCORE_ENVIRONMENT: Production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # ── Instagram ──────────────────────────────────────────────────────
          Instagram__AccessToken:  ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          Instagram__IgUserId:     ${{ secrets.INSTAGRAM_IG_USER_ID }}
          Instagram__ImgBbApiKey:  ${{ secrets.IMGBB_API_KEY }}
          # SOCKS5 de WARP (ver paso "Start Cloudflare WARP proxy") — vacío si el
          # túnel no levantó; el código solo agrega --proxy cuando no está vacío.
          Instagram__YtDlpProxy: ${{ env.YTDLP_PROXY }}
          # ── Cloudinary (host de imágenes preferido — key-auth, sin throttle de IP) ──
          Instagram__CloudinaryCloudName:  ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          Instagram__CloudinaryApiKey:     ${{ secrets.CLOUDINARY_API_KEY }}
          Instagram__CloudinaryApiSecret:  ${{ secrets.CLOUDINARY_API_SECRET }}
          Instagram__AppId:        ${{ secrets.INSTAGRAM_APP_ID }}
          Instagram__AppSecret:    ${{ secrets.INSTAGRAM_APP_SECRET }}
          Instagram__SiteUrl:      ${{ secrets.INSTAGRAM_SITE_URL }}
          Instagram__Handle:       "sheicobanime"
          # ── Suno vía sunoapi.org (tercero) — música FRESCA por reel ────────
          # Key en https://sunoapi.org/api-key → secret SUNO_API_KEY. Sin ella,
          # el reel usa la biblioteca de Cloudinary/CC (fallback, no rompe).
          Instagram__SunoApiKey:   ${{ secrets.SUNO_API_KEY }}
          # ── IA de reescritura (Gemini, free tier) ─────────────────────────
          # Sacá la key gratis (sin tarjeta) en https://aistudio.google.com → "Get API key"
          # y cargala como secret GEMINI_API_KEY. Sin ella, el pipeline cae a contenido
          # heurístico limpio (no rompe). Modelo/flags opcionales más abajo.
          Ai__ApiKey:              ${{ secrets.GEMINI_API_KEY }}
          # Ai__Model:             "gemini-2.0-flash"   # default
          # Ai__UseWebSearch:      "true"               # grounding con Google Search
          # ── News settings (optional overrides) ────────────────────────────
          # AnimeNews__MaxPerRun: "1"          # default: 1
          # AnimeNews__MaxAgeHours: "48"       # default: 48
          # To add more Spanish feeds without redeploying:
          # AnimeNews__Feeds__1__Key: "otrosite"
          # AnimeNews__Feeds__1__Url: "https://otrosite.com/feed/"
