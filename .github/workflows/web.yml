name: Web CI

run-name: "Web CI — ${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.number) || github.ref_name }}"

on:
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web.yml'
  # Disparo manual: re-deployar cuando cambia una Repository Variable
  # (NEXT_PUBLIC_*) sin necesidad de un commit en web/**.
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  typecheck-and-build:
    name: Next.js type-check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Type check
        run: npm run type-check
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:5000"
          NEXT_PUBLIC_AD_PROVIDER: "stub"
          NEXT_PUBLIC_DISQUS_SHORTNAME: "test"
          NEXT_PUBLIC_COMMENT_PROVIDER: "disqus"
          # Auth.js — placeholder values for build (runtime-only, not used at build time)
          AUTH_SECRET: "ci-build-secret-placeholder-32chars!!"
          AUTH_GOOGLE_ID: "placeholder"
          AUTH_GOOGLE_SECRET: "placeholder"
          AUTH_DISCORD_ID: "placeholder"
          AUTH_DISCORD_SECRET: "placeholder"
          NEXTAUTH_DATABASE_URL: ""

  deploy:
    name: Deploy to Cloudflare Workers
    needs: typecheck-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          # wrangler 4.x requires Node >= 22
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      # El deploy está separado en 3 pasos (antes era un solo `npm run cf:deploy`).
      # Motivo: `opennextjs-cloudflare deploy` siembra el cache incremental en KV
      # ANTES de publicar el worker, y si eso falla aborta TODO el deploy. El free
      # tier de KV son 1000 writes/día; cuando se agota, el seeding tira
      # `code: 10048` y el worker no se actualiza (deadlock: el fix no puede salir
      # porque deployar también escribe en KV). Separando los pasos, el seeding es
      # best-effort (continue-on-error) y el worker SIEMPRE se publica.
      - name: Build (OpenNext)
        run: npm run cf:build
        working-directory: web
        env:
          # NEXT_PUBLIC_* values are inlined into the client bundle at build
          # time — they are public by definition, so they live here in plain
          # text rather than in repo secrets.
          NEXT_PUBLIC_API_URL: "https://sheicobanime-api.onrender.com"
          # URL canónica — cambiar dominio = tocar acá y en wrangler.jsonc
          NEXT_PUBLIC_SITE_URL: "https://sheicobanime.sheicob.workers.dev"
          NEXT_PUBLIC_AD_PROVIDER: "adsterra"
          NEXT_PUBLIC_COMMENT_PROVIDER: "disqus"
          # Shortname real de Disqus (registrado cuando el sitio vivía en Vercel;
          # no se puede renombrar — solo se actualiza la Website URL en el admin)
          NEXT_PUBLIC_DISQUS_SHORTNAME: "sheicobanime-vercel-app"
          # Web Push (opcional): clave pública VAPID — la privada es secret de
          # los crons de notificaciones, nunca del build
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          # Códigos del sitio sheicobanime.sheicob.workers.dev en Adsterra (id 5889819).
          # Los viejos (pl291384xx.profitablecpmratenetwork.com) eran del website
          # sheicobanime.vercel.app (muerto) — Adsterra no contaba esas impresiones.
          NEXT_PUBLIC_ADSTERRA_NATIVE_HASH: "fff9b8d7f1888f68ae69ce1f0634afaf"
          NEXT_PUBLIC_ADSTERRA_NATIVE_SCRIPT: "https://pl30177589.effectivecpmnetwork.com/fff9b8d7f1888f68ae69ce1f0634afaf/invoke.js"
          NEXT_PUBLIC_ADSTERRA_SOCIALBAR_SCRIPT: "https://pl30177590.effectivecpmnetwork.com/30/10/83/301083467256706100b8c92c52f55990.js"
          NEXT_PUBLIC_ADSTERRA_POPUNDER_SCRIPT: "https://pl30177588.effectivecpmnetwork.com/0a/ea/04/0aea04f111b2db47fb6efa3187c83d3f.js"
          # Analytics + donaciones — definir como Repository Variables en
          # Settings → Secrets and variables → Actions → Variables (vacías = off).
          NEXT_PUBLIC_CF_ANALYTICS_TOKEN: ${{ vars.NEXT_PUBLIC_CF_ANALYTICS_TOKEN }}
          NEXT_PUBLIC_CAFECITO_URL: ${{ vars.NEXT_PUBLIC_CAFECITO_URL }}
          NEXT_PUBLIC_KOFI_URL: ${{ vars.NEXT_PUBLIC_KOFI_URL }}
          # Search Console: token del meta tag google-site-verification (público).
          # Repository Variable — vacío = el tag no se renderiza.
          NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ vars.NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION }}
          # Auth.js — build-time placeholders (real values are Worker secrets)
          AUTH_SECRET: "ci-build-secret-placeholder-32chars!!"
          AUTH_GOOGLE_ID: "placeholder"
          AUTH_GOOGLE_SECRET: "placeholder"
          AUTH_DISCORD_ID: "placeholder"
          AUTH_DISCORD_SECRET: "placeholder"
          NEXTAUTH_DATABASE_URL: ""

      # Siembra el cache incremental (ISR) en KV. BEST-EFFORT: si el cupo diario de
      # writes de KV está agotado (code 10048) NO debe tumbar el deploy — el worker
      # igual se publica abajo y el cache se repuebla solo en runtime cuando haya
      # cupo. Sin esto, un límite de KV bloquea toda actualización del sitio.
      - name: Seed KV incremental cache (best-effort)
        continue-on-error: true
        run: npx opennextjs-cloudflare populateCache remote
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Publica el worker (+ assets estáticos). `wrangler deploy` NO escribe en KV,
      # así que esto funciona aunque el seeding de arriba haya fallado por el límite.
      # OPEN_NEXT_DEPLOY=true es CLAVE: OpenNext instala un hook que intercepta
      # `wrangler deploy` y lo redirige a `opennextjs-cloudflare deploy` (que vuelve
      # a sembrar KV → falla con el límite agotado). Ese env var le dice al hook que
      # NO redirija, así corre el deploy plano de wrangler (sin tocar KV).
      - name: Deploy worker to Cloudflare
        run: npx wrangler deploy
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPEN_NEXT_DEPLOY: "true"

      # Sincroniza el secret de revalidación on-demand al worker (mismo valor que
      # usa el scraper, via el secret REVALIDATE_SECRET del repo). Sin esto el
      # endpoint /api/revalidate queda deshabilitado y el contenido se refresca
      # por el TTL de 60s. continue-on-error: nunca debe tumbar el deploy.
      - name: Sync worker secret (REVALIDATE_SECRET)
        continue-on-error: true
        run: printf '%s' "$REVALIDATE_SECRET" | npx wrangler secret put REVALIDATE_SECRET
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
