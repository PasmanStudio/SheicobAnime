name: Scraper — Daily cron

# Runs the scraper once per day (21:15 UTC = 18:15 Argentina time, UTC-3).
# Also triggerable manually from the Actions tab.
# Max runtime: 6 hours (GitHub Actions limit for free tier).
#
# Required secrets (Settings → Secrets → Actions):
#   DATABASE_URL          — Supabase connection string (Transaction/Session pooler)
#   REDIS_URL             — Upstash Redis URL (rediss://...)
#   HANGFIRE_DASHBOARD_PASSWORD — any password

on:
  schedule:
    - cron: '15 21 * * *'  # 21:15 UTC = 18:15 Argentina (UTC-3) daily
  workflow_dispatch:        # allow manual runs

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  scrape:
    name: Run scraper
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h — GitHub Actions absolute maximum

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '9.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-scraper-${{ hashFiles('scraper/**/*.csproj', 'api/AnimeIndex.Api/AnimeIndex.Api.csproj') }}
          restore-keys: nuget-scraper-

      - name: Restore
        run: dotnet restore scraper/AnimeIndex.Scraper/AnimeIndex.Scraper.csproj

      - name: Build
        run: dotnet build scraper/AnimeIndex.Scraper/AnimeIndex.Scraper.csproj --no-restore -c Release

      - name: Run scraper (up to 6h)
        run: dotnet run --project scraper/AnimeIndex.Scraper/AnimeIndex.Scraper.csproj --no-build -c Release
        env:
          ASPNETCORE_ENVIRONMENT: Production
          DATABASE_URL:  ${{ secrets.DATABASE_URL }}
          REDIS_URL:     ${{ secrets.REDIS_URL }}
          HANGFIRE_DASHBOARD_PASSWORD: ${{ secrets.HANGFIRE_DASHBOARD_PASSWORD }}
          SeekStreaming__ApiKey: ${{ secrets.SEEKSTREAMING_API_KEY }}
          # Parallel uploads: 20 simultaneous tus uploads (SeekStreaming account limit)
          SeekStreaming__MaxParallelUploads: "20"
          # Speed up scheduler: check every 30s (default is 15s but let's be explicit)
          Source2__DelayMs: "2000"
          # Force scheduler to fire immediately on startup (override 2am cron for GHA runs)
          Hangfire__SchedulerCron: "* * * * *"
          # ── Instagram publishing (optional — skipped if not set) ──
          # Long-lived Facebook User Access Token (valid ~60 days — renew monthly)
          Instagram__AccessToken:  ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          # Instagram Business Account numeric user ID (from granular_scopes in debug_token)
          Instagram__IgUserId:     ${{ secrets.INSTAGRAM_IG_USER_ID }}
          # imgbb.com API key for temporary public image hosting
          Instagram__ImgBbApiKey:  ${{ secrets.IMGBB_API_KEY }}
          # Facebook App credentials — used for monthly token re-extension
          Instagram__AppId:        ${{ secrets.INSTAGRAM_APP_ID }}
          Instagram__AppSecret:    ${{ secrets.INSTAGRAM_APP_SECRET }}
          # Max episodes in one carousel (Instagram hard limit: 10)
          Instagram__MaxCarouselItems: "10"
          # Public site URL for story link stickers and captions
          Instagram__SiteUrl: ${{ secrets.INSTAGRAM_SITE_URL }}
          # ── Discord publishing (optional — skipped if not set) ──
          # Incoming Webhook URL from: Server Settings → Integrations → Webhooks
          Discord__WebhookUrl: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Override display name / avatar if desired
          Discord__Username:   "SheicobAnime"
          Discord__SiteUrl:    ${{ secrets.INSTAGRAM_SITE_URL }}
          # ── Telegram publishing (optional — skipped if not set) ──
          # Bot token from @BotFather. Channel must have the bot as admin.
          Telegram__BotToken:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          Telegram__ChannelId: "@sheicobanime"
          Telegram__SiteUrl:   ${{ secrets.INSTAGRAM_SITE_URL }}
