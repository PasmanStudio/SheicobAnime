name: API CI

run-name: "API CI — ${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.number) || github.ref_name }}"

on:
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'scraper/**'
      - '.github/workflows/api.yml'
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'scraper/**'
      - '.github/workflows/api.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: .NET 9 build + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: animeindex_test
          POSTGRES_USER: animeindex
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '9.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('api/**/packages.lock.json', 'scraper/**/packages.lock.json', 'api/**/*.csproj', 'scraper/**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore api/AnimeIndex.sln --locked-mode

      - name: Build
        run: dotnet build api/AnimeIndex.sln --no-restore --configuration Release

      - name: Warnings as errors
        run: dotnet build api/AnimeIndex.sln --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Test with coverage
        run: |
          dotnet test api/AnimeIndex.sln \
            --no-build \
            --configuration Release \
            --logger trx \
            --collect:"XPlat Code Coverage" \
            --results-directory ./test-results
        env:
          DATABASE_URL: "Host=localhost;Database=animeindex_test;Username=animeindex;Password=testpassword;Maximum Pool Size=5"
          REDIS_URL: "localhost:6379"
          ADMIN_API_KEY: "test-admin-key"
          ASPNETCORE_ENVIRONMENT: "Testing"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: ./test-results
          retention-days: 7
