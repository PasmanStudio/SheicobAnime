name: KV setup (one-shot)

# Workflow temporal: crea el namespace de Cloudflare KV para el incremental
# cache de OpenNext (ISR), usando los secrets que YA existen para deployar.
# Se dispara a mano una sola vez; el id del namespace queda en el log (no es
# secreto). Después se borra este archivo.

on:
  workflow_dispatch:

jobs:
  create-kv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Create KV namespace
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Creando namespace NEXT_INC_CACHE_KV ==="
          npx --yes wrangler@latest kv namespace create NEXT_INC_CACHE_KV || true
          echo "=== Listado de namespaces (binding id) ==="
          npx --yes wrangler@latest kv namespace list
