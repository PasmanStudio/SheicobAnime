name: Deploy — Production

run-name: "Deploy — ${{ github.ref_name }} @ ${{ github.sha }}"

# Deploys after CI passes on push to main.
# Rollback: Render → rollback via Render dashboard. Frontend (Cloudflare) → web.yml.
# DB: no automatic rollback — always take a backup before running migrations.

on:
  push:
    branches: [main]
    # Solo redeploya el API/migraciones cuando cambia el BACKEND. Antes corría
    # en todo push (incluido frontend-only) y enfriaba Render gratuitamente —
    # cada deploy dejaba el home sin episodios hasta que Render despertaba.
    paths:
      - 'api/**'
      - 'scraper/**'
      - 'supabase/**'
      - 'db/**'
      - '.github/workflows/deploy.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a deploy mid-flight

jobs:
  # ─── CI gate: verify code is green before deploying ───
  ci-api:
    name: CI — API build + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: animeindex_test
          POSTGRES_USER: animeindex
          POSTGRES_PASSWORD: testpassword
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '9.x'
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('api/**/*.csproj', 'scraper/**/*.csproj') }}
          restore-keys: nuget-
      - name: Restore
        run: dotnet restore api/AnimeIndex.sln --locked-mode
      - name: Build
        run: dotnet build api/AnimeIndex.sln --no-restore --configuration Release
      - name: Test
        run: dotnet test api/AnimeIndex.sln --no-build --configuration Release --logger trx
        env:
          DATABASE_URL: "Host=localhost;Database=animeindex_test;Username=animeindex;Password=testpassword;Maximum Pool Size=5"
          REDIS_URL: "localhost:6379"
          ADMIN_API_KEY: "test-admin-key"
          ASPNETCORE_ENVIRONMENT: "Testing"

  ci-web:
    name: CI — Frontend type-check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: web
      - name: Type check
        run: npm run type-check
        working-directory: web
      - name: Build
        run: npm run build
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:5000"
          NEXT_PUBLIC_AD_PROVIDER: "stub"
          NEXT_PUBLIC_DISQUS_SHORTNAME: "test"
          NEXT_PUBLIC_COMMENT_PROVIDER: "disqus"
          # Auth.js — dummy values for build (not used at build time, only at runtime)
          AUTH_SECRET: "ci-build-secret-placeholder-32chars"
          AUTH_GOOGLE_ID: "placeholder"
          AUTH_GOOGLE_SECRET: "placeholder"
          AUTH_DISCORD_ID: "placeholder"
          AUTH_DISCORD_SECRET: "placeholder"
          NEXTAUTH_DATABASE_URL: ""

  # ─── Guard: skip migration if DATABASE_URL not configured ───
  check-secrets:
    name: Check production secrets
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.DATABASE_URL }}" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "::warning::DATABASE_URL not configured — skipping migration"
          fi

  # ─── Database migration (runs after CI passes) ───
  migrate:
    name: Run DB migrations
    needs: [ci-api, ci-web, check-secrets]
    if: needs.check-secrets.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '9.x'
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('api/**/*.csproj', 'scraper/**/*.csproj') }}
          restore-keys: nuget-
      - name: Restore
        run: dotnet restore api/AnimeIndex.sln --locked-mode
      - name: Install EF CLI tool
        run: dotnet tool install --global dotnet-ef
      # DATABASE_URL uses the session-mode pooler (IPv4-reachable from GH Actions).
      # Supabase direct hostname is IPv6-only, which GH Actions cannot reach.
      # Session-mode pooler supports full transaction semantics needed for EF migrations.
      - name: Run migrations
        run: |
          CONN="${{ secrets.DATABASE_URL }}"
          # Convert postgresql:// URI to ADO.NET format if needed
          if [[ "$CONN" == postgresql://* ]] || [[ "$CONN" == postgres://* ]]; then
            # Parse URI: postgresql://user:pass@host:port/db
            PROTO="${CONN%%://*}"
            REST="${CONN#*://}"
            USERINFO="${REST%%@*}"
            HOSTINFO="${REST#*@}"
            DB_USER="${USERINFO%%:*}"
            DB_PASS="${USERINFO#*:}"
            HOST_PORT="${HOSTINFO%%/*}"
            DB_NAME="${HOSTINFO#*/}"
            DB_NAME="${DB_NAME%%\?*}"  # strip query params
            DB_HOST="${HOST_PORT%%:*}"
            DB_PORT="${HOST_PORT#*:}"
            [ "$DB_PORT" = "$DB_HOST" ] && DB_PORT=5432
            CONN="Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASS};SSL Mode=Require;Trust Server Certificate=true;Pooling=false;Timeout=60"
          fi
          # Retry up to 5 times — PgBouncer session pooler may reject during peak connections
          for attempt in 1 2 3 4 5; do
            echo "Migration attempt $attempt/5..."
            if dotnet ef database update --project api/AnimeIndex.Api --connection "$CONN"; then
              echo "Migration succeeded on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              WAIT=$((attempt * 30))
              echo "Migration failed, retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done
          echo "::error::Migration failed after 5 attempts"
          exit 1

  # ─── Deploy services (after migration succeeds) ───
  deploy-api:
    name: Deploy API to Render
    needs: migrate
    if: needs.migrate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render redeploy
        run: |
          RESULT=$(curl -sf -X POST \
            "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}')
          DEPLOY_ID=$(echo "$RESULT" | jq -r '.id // .deploy.id')
          echo "Render deploy triggered: $DEPLOY_ID"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}

