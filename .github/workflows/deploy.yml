  #         printf 'disqus' | vercel env add NEXT_PUBLIC_COMMENT_PROVIDER production --force --token=${{ secrets.VERCEL_TOKEN }}
  #         printf 'sheicobanime-vercel-app' | vercel env add NEXT_PUBLIC_DISQUS_SHORTNAME production --force --token=${{ secrets.VERCEL_TOKEN }}
  #         printf 'https://discord.gg/yVaQtGfE' | vercel env add NEXT_PUBLIC_DISCORD_INVITE production --force --token=${{ secrets.VERCEL_TOKEN }}
