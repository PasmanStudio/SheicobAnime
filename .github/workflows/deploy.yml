name: Deploy — Production

run-name: "Deploy — ${{ github.ref_name }} @ ${{ github.sha }}"

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false  # Never cancel a deploy mid-flight

jobs:
  # Guard: skip deploy entirely when production secrets are not yet configured
  check-secrets:
    name: Check production secrets configured
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.SUPABASE_DB_URL_DIRECT }}" ] && [ -n "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "ready=true" >> $GITHUB_OUTPUT
          else
            echo "ready=false" >> $GITHUB_OUTPUT
            echo "::warning::Production secrets not configured — skipping deploy (Phase 7 prerequisite)"
          fi

  # Run DB migrations before deploying new API version
  migrate:
    name: Run DB migrations
    needs: check-secrets
    if: needs.check-secrets.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '9.x'
      - name: Restore
        run: dotnet restore api/AnimeIndex.sln --locked-mode
      - name: Install EF CLI tool
        run: dotnet tool install --global dotnet-ef
      - name: Run migrations
        run: |
          dotnet ef database update \
            --project api/AnimeIndex.Api \
            --connection "${{ secrets.SUPABASE_DB_URL_DIRECT }}"

  deploy-api:
    name: Deploy API to Railway
    needs: migrate
    if: needs.migrate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '9.x'
      - name: Publish
        run: dotnet publish api/AnimeIndex.Api -c Release -o ./publish
      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SERVICE_ID }}

  deploy-scraper:
    name: Deploy Scraper to Railway
    needs: migrate
    if: needs.migrate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '9.x'
      - name: Publish scraper
        run: dotnet publish scraper/AnimeIndex.Scraper/AnimeIndex.Scraper.csproj -c Release -o ./publish-scraper
      - name: Deploy scraper to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: ${{ secrets.RAILWAY_SCRAPER_SERVICE_ID }}

  deploy-web:
    name: Deploy frontend to Vercel
    needs: deploy-api
    if: needs.deploy-api.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: web
