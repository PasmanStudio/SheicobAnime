name: IMDb — link episodes & refresh ratings

# Runs once a day. Resolves series + per-episode EXACT IMDb ids and refreshes IMDb ratings,
# all via OMDb alone (no TMDB needed — see ImdbLinkResolverService for why). Best-effort:
# skips gracefully if OMDB_API_KEY is missing.

on:
  schedule:
    - cron: '0 5 * * *'   # 05:00 UTC daily (~2 AM Argentina)
  workflow_dispatch:        # allow manual trigger from the Actions tab

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  imdb:
    name: Resolve IMDb links
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '9.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-scraper-${{ hashFiles('scraper/**/*.csproj', 'api/AnimeIndex.Api/AnimeIndex.Api.csproj') }}
          restore-keys: nuget-scraper-

      - name: Restore
        run: dotnet restore scraper/AnimeIndex.Scraper/AnimeIndex.Scraper.csproj

      - name: Build
        run: dotnet build scraper/AnimeIndex.Scraper/AnimeIndex.Scraper.csproj --no-restore -c Release

      - name: Run IMDb linker
        run: dotnet run --project scraper/AnimeIndex.Scraper --no-build -c Release -- --imdb
        env:
          ASPNETCORE_ENVIRONMENT: Production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Free key (1000/day, no commercial-use restriction): omdbapi.com/apikey.aspx
          Imdb__OmdbApiKey: ${{ secrets.OMDB_API_KEY }}
          # Optional tuning:
          # Imdb__SeriesBatch: "40"
          # Imdb__EpisodeBatch: "120"
          # Imdb__RatingBatch: "150"
